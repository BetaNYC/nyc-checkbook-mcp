# CI gate for @betanyc/nyc-checkbook-mcp.
#
# What it enforces: the TypeScript build (`npm run build` -> `tsc`) succeeds on
# a clean `npm ci` install, across the supported Node range. This catches type
# errors and dependency drift before merge — the same version-safety discipline
# the main workspace's Python tree enforces in engineering-checks.yml (see
# platform/system/engineering-standards.md in BetaNYC_AI_Workspace).
#
# Runs the build plus the node:test suite in test/ (tool-list parity and
# criteria-construction unit tests).
#
# Node matrix: 20.x and 22.x. package.json declares engines "node >= 18", but
# Node 18 reached End-of-Life on 2025-04-30, so the matrix covers only
# actively-maintained LTS releases (20 = floor, 22 = current LTS). This mirrors
# the established convention in the sibling nyc-charter-laws-rules repo
# (.github/workflows/test.yml). If the engines floor is raised to >= 20, update
# this comment. fail-fast is disabled so a break on one version still reports
# the other.

name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "**/*.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
  # Manual trigger — lets us fire a run on any branch. Needed because a
  # path-scoped pull_request/push event does not fire on the very PR that
  # introduces the workflow, so this gate never executed on its own PR (#2).
  # Adding `.github/workflows/**` to the path filters above closes that gap for
  # future workflow edits; this dispatch is retained permanently as a low-cost
  # affordance for on-demand re-runs.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "20.x"
          - "22.x"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: node --test
