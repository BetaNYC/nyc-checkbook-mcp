# CI gate for @betanyc/nyc-checkbook-mcp.
#
# What it enforces: the TypeScript build (`npm run build` -> `tsc`) succeeds on
# a clean `npm ci` install, across the supported Node range. This catches type
# errors and dependency drift before merge — the same version-safety discipline
# the main workspace's Python tree enforces in engineering-checks.yml (see
# platform/system/engineering-standards.md in BetaNYC_AI_Workspace).
#
# Runs `npm test`, which is `npm run build && node --test test/*.test.mjs` —
# the same command a developer runs locally. That matters: this job previously
# ran a bare `node --test`, which discovers test files by walking the directory
# and therefore stayed green even while the `npm test` script itself was broken
# on Node 20 (a quoted glob, unsupported as a `node --test` argument before Node
# 22, matched nothing and ran zero tests). CI and local must run the same
# command or CI cannot vouch for the command anyone actually uses.
#
# The glob in that script is deliberately UNQUOTED so the shell expands it and
# node receives literal file paths on every supported version. Do not re-add the
# quotes.
#
# No separate build step: `npm test` compiles first, so one would only run tsc
# twice. A compile error still fails the job, with tsc's output at the top of
# the step log.
#
# Node matrix: 20.x and 22.x. package.json declares engines "node >= 18", but
# Node 18 reached End-of-Life on 2025-04-30, so the matrix covers only
# actively-maintained LTS releases (20 = floor, 22 = current LTS). This mirrors
# the established convention in the sibling nyc-charter-laws-rules repo
# (.github/workflows/test.yml). If the engines floor is raised to >= 20, update
# this comment. fail-fast is disabled so a break on one version still reports
# the other.

name: CI

on:
  # `test/**` matters: the tests and their fixtures are .mjs/.xml, so `**/*.ts`
  # does not match them and a test-only change would otherwise skip this gate
  # entirely — silently, which is the failure mode this workflow exists to catch.
  pull_request:
    branches: [main]
    paths:
      - "**/*.ts"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "**/*.ts"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
  # Manual trigger — lets us fire a run on any branch. Needed because a
  # path-scoped pull_request/push event does not fire on the very PR that
  # introduces the workflow, so this gate never executed on its own PR (#2).
  # Adding `.github/workflows/**` to the path filters above closes that gap for
  # future workflow edits; this dispatch is retained permanently as a low-cost
  # affordance for on-demand re-runs.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Build & test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "20.x"
          - "22.x"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm test
